<style>
:root{
--navy:#0f2340;
--navy2:#1b3a5c;
--navy3:#2a5285;
--paper:#f0f3f8;
--card:#ffffff;
--accent:#c97b4a;

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--paper);color:var(--ink);padding-bottom:100px;}
header{background:var(--navy);color:#fff;padding:16px 18px 14px;position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:1.25rem;font-weight:700;letter-spacing:0.03em;color:#fff;}

.hbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:7px;padding:5px 10px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.85);cursor:pointer;}
.month-nav{display:flex;align-items:center;gap:8px;margin-top:12px;}
.mnbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;width:28px;height:28px;font-size:1rem;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.month-label{font-size:0.88rem;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.75);min-width:155px;}
.today-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:3px 9px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.7);cursor:pointer;}
.tabs{display:flex;background:var(--navy2);border-bottom:1px solid rgba(255,255,255,0.08);}
.tab{flex:1;padding:9px 4px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:#fff;border-bottom-color:var(--accent);}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--card);border-bottom:1px solid var(--line);}
.sum-box{padding:12px 14px;border-right:1px solid var(--line);}
.sum-box:last-child{border-right:none;}
.sum-lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:3px;}
.sum-val{font-size:1.08rem;font-weight:700;}
.sum-val.red{color:var(--due);}
.sum-val.green{color:var(--ok);}
.sum-val.blue{color:var(--navy3);}
.debt-panel{background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px 14px;}
.debt-panel-title{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:9px;}
.debt-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.debt-name{font-size:0.78rem;color:var(--ink);width:115px;min-width:115px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.debt-track{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.debt-fill{height:100%;border-radius:3px;background:var(--navy3);}
.debt-fill.done{background:var(--ok);}
.debt-info{font-size:0.7rem;color:var(--muted);white-space:nowrap;min-width:95px;text-align:right;}
.debt-more{font-size:0.72rem;color:var(--navy3);cursor:pointer;text-align:center;margin-top:6px;}
.sec-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);padding:14px 16px 5px;}
.item{background:var(--card);margin:5px 12px;border-radius:10px;padding:11px 11px;display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-left:3px solid var(--line);}
.item.done{opacity:0.42;}
.item.overdue{border-left-color:var(--due);}
.item.due-soon{border-left-color:var(--warn);}
.item.cat-credit{border-left-color:var(--navy3);}
.item.cat-media{border-left-color:var(--ok);}
.item.cat-sub{border-left-color:var(--accent);}

.check{width:34px;height:34px;min-width:34px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.check.x{color:var(--due);border-color:var(--due);}
.check.v{color:var(--ok);border-color:var(--ok);background:var(--ok-bg);}
.info{flex:1;min-width:0;}
.iname{font-size:0.92rem;font-weight:700;color:var(--ink);}
.imeta{font-size:0.72rem;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.tag{border-radius:4px;padding:1px 6px;font-size:0.63rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;}
.tag.kredyt{background:rgba(42,82,133,0.12);color:var(--navy3);}
.tag.media{background:var(--ok-bg);color:var(--ok);}
.tag.sub{background:#fdf0e6;color:var(--accent);}
.tag.coroczna{background:var(--purple-bg);color:var(--purple);}

.hidden-lbl{color:var(--muted);font-style:italic;}

.inst-track{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.inst-fill{height:100%;border-radius:2px;background:var(--navy3);}

.amount-col{text-align:right;flex-shrink:0;}

.end-date{display:block;font-size:0.67rem;color:var(--muted);margin-top:1px;}
.item-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.ia-btn{background:none;border:none;cursor:pointer;color:var(--line);font-size:0.85rem;padding:2px;transition:color .15s;line-height:1;}

.field input,.field select,.field textarea{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:8px;font-size:0.92rem;background:#fff;color:var(--ink);font-family:inherit;}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

.type-toggle{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap;}
.type-toggle button{flex:1;min-width:80px;padding:8px 4px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:0.73rem;cursor:pointer;color:var(--muted);font-family:inherit;}
.type-toggle button.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.section-toggle{display:none;}
.section-toggle.show{display:block;}
.hint{font-size:0.72rem;color:var(--muted);margin-top:-5px;margin-bottom:10px;line-height:1.5;}
.modal-actions{display:flex;gap:9px;margin-top:14px;}
.btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;}
.btn.primary{background:var(--navy);color:#fff;}
.btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--line);}
.btn.danger{background:var(--due);color:#fff;}
.archive-item{background:var(--card);margin:5px 12px;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;border:1px solid var(--line);opacity:0.7;}
.arch-name{flex:1;font-size:0.88rem;color:var(--muted);}
.arch-amt{font-size:0.88rem;font-weight:700;color:var(--muted);}
.restore-btn{font-size:0.68rem;border:1px solid var(--line);background:none;border-radius:6px;padding:3px 8px;cursor:pointer;color:var(--navy3);font-family:inherit;}
/* pasek statusu synchronizacji — DODANE */
#syncStatus{font-size:0.65rem;text-align:center;padding:4px;color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.15);}
</style>

<script>
const MONTHS_PL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
const CAT_LABELS = {credit:'Kredyt',cyclic:'Cykliczna',media:'Media',sub:'Abonament',annual:'Coroczna',other:'Inne'};
const CAT_TAG_CLS = {credit:'kredyt',cyclic:'inne',media:'media',sub:'sub',annual:'coroczna',other:'inne'};
const CAT_ITEM_CLS = {credit:'cat-credit',cyclic:'',media:'cat-media',sub:'cat-sub',annual:'cat-annual',other:''};

const DEFAULTS = [
{id:'d1', type:'credit', name:'Kredyt przykładowy', amount:1234.56, day:10, totalInstallments:120, currentInstallment:12, remaining:null, endDate:'2035-01', note:'przykład'},
{id:'d2', type:'credit', name:'Raty za sprzęt', amount:250, day:15, totalInstallments:24, currentInstallment:6, remaining:null, endDate:'', note:'przykład'},
{id:'d3', type:'media', name:'Czynsz (przykład)', amount:500, day:10, note:''},
{id:'d4', type:'media', name:'Prąd (przykład)', amount:180, day:24, freq:2, freqMonth:1, note:'co 2 miesiące'},
{id:'d5', type:'sub', name:'Serwis streamingowy',amount:29.99, day:5, note:'przykład'},
{id:'d6', type:'annual', name:'Ubezpieczenie roczne',amount:600, day:20, annualMonth:3, note:'przykład'},
{id:'d7', type:'other', name:'Inna opłata', amount:100, day:12, note:'przykład'},
];

/* ---- DATA (localStorage jako lokalna kopia/cache) ---- */
function loadData(){
const raw = localStorage.getItem('platnosci_v3');
if(raw) return JSON.parse(raw);
const v2 = localStorage.getItem('platnosci_v2');
if(v2){ try{ const d=JSON.parse(v2); return {items:d.items||[], paid:d.paid||{}, archived:[]}; }catch(e){} }
return {items:JSON.parse(JSON.stringify(DEFAULTS)), paid:{}, archived:[]};
}

/* saveData: zapisuje lokalnie ORAZ wysyła do Firebase, żeby zsynchronizować z innymi urządzeniami */
let _suppressUpload = false;
function saveData(d){
localStorage.setItem('platnosci_v3', JSON.stringify(d));
if(!_suppressUpload && fbAuth.currentUser){
fbRef.set(d).catch(err=>console.error('Błąd zapisu do Firebase:', err));
}
}

function monthKey(y,m){ return y+'-'+(m+1); }
function isPaid(data,id,y,m){ const mk=monthKey(y,m); return !!(data.paid[mk]&&data.paid[mk][id]); }
function setPaid(data,id,y,m,v){ const mk=monthKey(y,m); if(!data.paid[mk])data.paid[mk]={}; data.paid[mk][id]=v; }
function fmt(n){ return (Math.round(n*100)/100).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})+' zł'; }
function fmtShort(n){ if(n>=100000) return Math.round(n/1000)+' tys. zł'; if(n>=10000) return (Math.round(n/100)/10).toFixed(1)+' tys. zł'; return Math.round(n)+' zł'; }
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function appPaidBefore(data,item,y,m){
let count=0;
Object.keys(data.paid).forEach(mk=>{
const [ky,km1]=mk.split('-').map(Number);
const km=km1-1;
if(ky<y||(ky===y&&km<m)) if(data.paid[mk][item.id]) count++;
});
return count;
}
function instForMonth(item,data,y,m){
return item.currentInstallment + appPaidBefore(data,item,y,m);
}

function amountFor(data,item,y,m){
const mk=monthKey(y,m);
if(data.override&&data.override[mk]&&data.override[mk][item.id]!=null) return data.override[mk][item.id];
return Number(item.amount)||0;
}
function hasOverride(data,id,y,m){
const mk=monthKey(y,m);
return !!(data.override&&data.override[mk]&&data.override[mk][id]!=null);
}
function editAmount(id){
const data=loadData();
const it=data.items.find(x=>x.id===id); if(!it) return;
const cur=amountFor(data,it,viewYear,viewMonth);
const inp=prompt('Kwota w tym miesiącu dla „'+it.name+'”.\nZostaw puste, aby wrócić do standardowej ('+fmt(Number(it.amount)||0)+').',cur);
if(inp===null) return;
const mk=monthKey(viewYear,viewMonth);
if(!data.override) data.override={};
if(!data.override[mk]) data.override[mk]={};
if(inp.trim()===''){ delete data.override[mk][it.id]; }
else {
const v=parseFloat(inp.replace(',','.'));
if(isNaN(v)){ alert('To nie jest poprawna kwota.'); return; }
data.override[mk][it.id]=v;
}
saveData(data); render();
}

let viewYear, viewMonth, currentTab='month', debtExpanded=false, editingId=null;
let currentType='cyclic';
function goToday(){ const n=new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth(); render(); }
function changeMonth(d){ viewMonth+=d; if(viewMonth>11){viewMonth=0;viewYear++;} if(viewMonth<0){viewMonth=11;viewYear--;} render(); }
function setTab(t){ currentTab=t; document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['month','debts','all','archive'][i]===t)); render(); }
function toggleDebt(){ debtExpanded=!debtExpanded; render(); }

function render(){
const data=loadData();
const now=new Date();
const isCurrent=viewYear===now.getFullYear()&&viewMonth===now.getMonth();
document.getElementById('monthLabel').textContent=MONTHS_PL[viewMonth]+' '+viewYear;
['month','debts','all','archive'].forEach(t=>{ document.getElementById('view-'+t).style.display=currentTab===t?'block':'none'; });
if(currentTab==='month') renderMonth(data,now,isCurrent);
if(currentTab==='debts') renderDebts(data,now);
if(currentTab==='all') renderAll(data);
if(currentTab==='archive') renderArchive(data);
const banner=document.getElementById('backupBanner');
const last=data.lastExport?new Date(data.lastExport):null;
const days=last?Math.floor((now-last)/86400000):null;
if(days===null||days>=14){
document.getElementById('backupBannerText').textContent=days===null
?'Nie masz jeszcze kopii zapasowej danych.'
:'Ostatnia kopia zapasowa: '+days+' dni temu.';
banner.style.display='flex';
} else banner.style.display='none';
}

function itemVisibleThisMonth(item,data,y,m){
if(item.hidden) return false;
if(item.type==='annual') return item.annualMonth===(m+1);
if(item.type==='credit'){
const inst=instForMonth(item,data,y,m);
return inst>=1&&inst<=item.totalInstallments;
}
const f=item.freq||1;
if(f<=1) return true;
const anchor=(item.freqMonth||1)-1;
const diff=((m-anchor)%f+f)%f;
return diff===0;
}

function renderMonth(data,now,isCurrent){
const active=data.items.filter(i=>!i.archived && itemVisibleThisMonth(i,data,viewYear,viewMonth));
const byCat={credit:[],media:[],sub:[],annual:[],cyclic:[],other:[]};
active.forEach(i=>{ const c=i.type||'other'; (byCat[c]||byCat.other).push(i); });
let due=0,done=0,total=0;
active.forEach(i=>{ const p=isPaid(data,i.id,viewYear,viewMonth); const a=amountFor(data,i,viewYear,viewMonth); total+=a; if(p)done+=a; else due+=a; });
document.getElementById('sumDue').textContent=fmt(due);
document.getElementById('sumDone').textContent=fmt(done);
document.getElementById('sumTotal').textContent=fmt(total);
const order=['credit','media','sub','annual','cyclic','other'];
const secNames={credit:'Kredyty i raty',media:'Media',sub:'Abonamenty',annual:'Coroczne',cyclic:'Cykliczne',other:'Inne'};
let html='';
order.forEach(cat=>{
const items=byCat[cat];
if(!items||!items.length) return;
const sorted=[...items].sort((a,b)=>{
const pa=isPaid(data,a.id,viewYear,viewMonth),pb=isPaid(data,b.id,viewYear,viewMonth);
if(pa!==pb) return pa?1:-1;
return (a.day||99)-(b.day||99);
});
html+=`<div class="sec-label">${secNames[cat]}</div>`;
sorted.forEach(it=>{ html+=itemHtml(it,data,now,isCurrent,true); });
});
if(!html) html='<div class="empty">Brak płatności na ten miesiąc.<br>Dotknij + aby dodać.</div>';
document.getElementById('monthContent').innerHTML=html;
}

function renderDebts(data,now){
const credits=data.items.filter(i=>!i.archived&&i.type==='credit');
if(!credits.length){ document.getElementById('debtsContent').innerHTML='<div class="empty">Brak kredytów i rat.</div>'; return; }
let totalDebt=0;
credits.forEach(i=>{ if(i.remaining!=null) totalDebt+=Number(i.remaining); });
let html='<div class="debt-panel">';
if(totalDebt>0) html+=`<div style="margin-bottom:10px;font-size:0.78rem;color:var(--muted)">Łączne zadłużenie: <strong style="color:var(--navy)">${fmt(totalDebt)}</strong></div>`;
credits.forEach(it=>{
const inst=instForMonth(it,data,viewYear,viewMonth);
const paidN=Math.max(0,it.currentInstallment-1+appPaidBefore(data,it,viewYear,viewMonth));
const tot=it.totalInstallments;
const pct=tot>0?Math.min(100,Math.round(paidN/tot*100)):0;
const left=Math.max(0,tot-paidN);
const isDone=paidN>=tot;
let infoStr=`${paidN}/${tot} rat · zostało ${left}`;
if(it.remaining!=null) infoStr+=' · '+fmtShort(it.remaining);
if(it.endDate) infoStr+=' · do '+it.endDate;
html+=`<div class="debt-row">
<span class="debt-name" title="${esc(it.name)}">${esc(it.name)}</span>
<div class="debt-track"><div class="debt-fill ${isDone?'done':''}" style="width:${pct}%"></div></div>
<span class="debt-info">${infoStr}</span>
</div>`;
});
html+='</div>';
html+='<div class="sec-label">Szczegóły</div>';
credits.forEach(it=>{ html+=itemHtml(it,data,now,true,false); });
document.getElementById('debtsContent').innerHTML=html;
}

function renderAll(data){
const active=data.items.filter(i=>!i.archived);
if(!active.length){ document.getElementById('allContent').innerHTML='<div class="empty">Brak pozycji. Dodaj pierwszą klikając +</div>'; return; }
const sorted=[...active].sort((a,b)=>(a.day||99)-(b.day||99));
const now=new Date();
let html='<div class="sec-label">Wszystkie aktywne ('+active.length+')</div>';
sorted.forEach(it=>{ html+=itemHtml(it,data,now,true,false); });
document.getElementById('allContent').innerHTML=html;
}

function renderArchive(data){
const arch=data.items.filter(i=>i.archived);
if(!arch.length){ document.getElementById('archiveContent').innerHTML='<div class="empty">Archiwum jest puste.<br>Ukryte/zakończone płatności pojawią się tutaj.</div>'; return; }
let html='<div class="sec-label">Archiwum ('+arch.length+')</div>';
arch.forEach(it=>{
html+=`<div class="archive-item">
<span class="arch-name">${esc(it.name)} <span style="font-size:0.68rem">(${CAT_LABELS[it.type]||it.type})</span></span>
<span class="arch-amt">${fmt(it.amount)}</span>
<button class="restore-btn" onclick="restoreItem('${it.id}')">Przywróć</button>
<button class="restore-btn" style="color:var(--due)" onclick="deleteItem('${it.id}')">Usuń</button>
</div>`;
});
document.getElementById('archiveContent').innerHTML=html;
}

function itemHtml(it,data,now,isCurrent,showCheck){
const paid=isPaid(data,it.id,viewYear,viewMonth);
const day=it.day||null;
const overdue=isCurrent&&!paid&&day&&day<now.getDate();
const soon=isCurrent&&!paid&&day&&(day-now.getDate())>=0&&(day-now.getDate())<=3;
let cls='item '+(CAT_ITEM_CLS[it.type]||'');
if(paid) cls+=' done';
if(overdue) cls+=' overdue';
if(soon&&!overdue) cls+=' due-soon';
let meta=[];
if(day){
const ds=day+'.'+String(viewMonth+1).padStart(2,'0');
if(overdue) meta.push(`<span class="overdue-lbl">‼ Termin: ${ds}</span>`);
else if(soon) meta.push(`<span class="soon-lbl">⚡ do ${ds}</span>`);
else meta.push(`<span>do ${day}.</span>`);
}
const tc=CAT_TAG_CLS[it.type]||'inne';
meta.push(`<span class="tag ${tc}">${CAT_LABELS[it.type]||it.type}</span>`);
if((it.freq||1)>1) meta.push(`<span class="tag inne">co ${it.freq} mies.</span>`);
if(it.note) meta.push(`<span style="font-style:italic">${esc(it.note)}</span>`);
let instHtml='', remHtml='', endHtml='';
if(it.type==='credit'){
const inst=instForMonth(it,data,viewYear,viewMonth);
const paidN=Math.max(0,inst-1);
const tot=it.totalInstallments;
const pct=tot>0?Math.min(100,Math.round(paidN/tot*100)):0;
const left=Math.max(0,tot-inst+1);
instHtml=`<div class="inst-bar">
<div class="inst-track"><div class="inst-fill" style="width:${pct}%"></div></div>
<span class="inst-lbl">rata ${inst}/${tot} · zostało ${left}</span>
</div>`;
if(it.remaining!=null) remHtml=`<span class="remaining">${fmt(it.remaining)} do spłaty</span>`;
if(it.endDate) endHtml=`<span class="end-date">do ${it.endDate}</span>`;
}
const checkHtml=showCheck?`<div class="check ${paid?'v':'x'}" onclick="toggle('${it.id}')">${paid?'✓':'✗'}</div>`:'<div style="width:10px"></div>';
const shownAmount=amountFor(data,it,viewYear,viewMonth);
const overridden=hasOverride(data,it.id,viewYear,viewMonth);
const amountHtml=showCheck
?`<span class="amount" style="cursor:pointer;border-bottom:1px dashed var(--line)" onclick="editAmount('${it.id}')" title="Kliknij, aby zmienić kwotę w tym miesiącu">${fmt(shownAmount)}</span>`
:`<span class="amount">${fmt(shownAmount)}</span>`;
const overrideHtml=overridden?`<span class="end-date">standardowo ${fmt(Number(it.amount)||0)}</span>`:'';
return `<div class="${cls}" id="item-${it.id}">
${checkHtml}
<div class="info">
<div class="iname">${esc(it.name)}</div>
<div class="imeta">${meta.join('')}</div>
${instHtml}
</div>
<div class="amount-col">
${amountHtml}
${overrideHtml}${remHtml}${endHtml}
</div>
<div class="item-actions">
<button class="ia-btn" onclick="openModal('${it.id}')" title="Edytuj">✎</button>
<button class="ia-btn del" onclick="archiveItem('${it.id}')" title="Ukryj/Archiwizuj">⤓</button>
</div>
</div>`;
}

function toggle(id){
const data=loadData();
const cur=isPaid(data,id,viewYear,viewMonth);
setPaid(data,id,viewYear,viewMonth,!cur);
saveData(data); render();
}

function archiveItem(id){
if(!confirm('Ukryć/zarchiwizować tę pozycję? Znajdziesz ją w zakładce Archiwum.')) return;
const data=loadData();
const it=data.items.find(x=>x.id===id);
if(it){ it.archived=true; saveData(data); render(); }
}
function restoreItem(id){
const data=loadData();
const it=data.items.find(x=>x.id===id);
if(it){ it.archived=false; saveData(data); render(); }
}
function deleteItem(id){
if(!confirm('Trwale usunąć? Tej operacji nie można cofnąć.')) return;
const data=loadData();
data.items=data.items.filter(x=>x.id!==id);
saveData(data); render();
}

function setType(t){
currentType=t;
document.querySelectorAll('#typeToggle button').forEach(b=>b.classList.toggle('active',b.dataset.type===t));
document.getElementById('creditFields').classList.toggle('show',t==='credit');
document.getElementById('annualFields').classList.toggle('show',t==='annual');
document.getElementById('freqFields').classList.toggle('show',t==='cyclic'||t==='media'||t==='sub'||t==='other');
}
function updateFreqMonthVisibility(){
const f=parseInt(document.getElementById('fFreq').value)||1;
document.getElementById('freqMonthField').style.display=f>1?'block':'none';
document.getElementById('freqHint').style.display=f>1?'block':'none';
}
function openModal(id){
editingId=id;
const data=loadData();
const it=id?data.items.find(x=>x.id===id):null;
document.getElementById('modalTitle').textContent=it?'Edytuj płatność':'Nowa płatność';
document.getElementById('fName').value=it?it.name:'';
document.getElementById('fAmount').value=it?it.amount:'';
document.getElementById('fDay').value=it&&it.day?it.day:'';
document.getElementById('fNote').value=it&&it.note?it.note:'';
document.getElementById('fTotalInst').value=it&&it.totalInstallments?it.totalInstallments:'';
document.getElementById('fCurrentInst').value=it&&it.currentInstallment?it.currentInstallment:1;
document.getElementById('fRemaining').value=it&&it.remaining!=null?it.remaining:'';
document.getElementById('fEndDate').value=it&&it.endDate?it.endDate:'';
document.getElementById('fAnnualMonth').value=it&&it.annualMonth?it.annualMonth:'';
document.getElementById('fFreq').value=it&&it.freq?it.freq:1;
document.getElementById('fFreqMonth').value=it&&it.freqMonth?it.freqMonth:((viewMonth%12)+1);
updateFreqMonthVisibility();
setType(it?it.type:'cyclic');
document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); editingId=null; }
function saveItem(){
const name=document.getElementById('fName').value.trim();
const amount=parseFloat(document.getElementById('fAmount').value);
if(!name||isNaN(amount)){ alert('Podaj przynajmniej nazwę i kwotę.'); return; }
const data=loadData();
const day=parseInt(document.getElementById('fDay').value)||null;
const note=document.getElementById('fNote').value.trim();
let item;
if(editingId){
item=data.items.find(x=>x.id===editingId);
if(!item) return;
} else {
item={id:'id'+Date.now()};
data.items.push(item);
}
item.type=currentType;
item.name=name;
item.amount=amount;
item.day=day;
item.note=note;
if(currentType==='credit'){
item.totalInstallments=parseInt(document.getElementById('fTotalInst').value)||1;
item.currentInstallment=parseInt(document.getElementById('fCurrentInst').value)||1;
const rem=document.getElementById('fRemaining').value;
item.remaining=rem!==''?parseFloat(rem):null;
item.endDate=document.getElementById('fEndDate').value.trim();
}
if(currentType==='annual'){
item.annualMonth=parseInt(document.getElementById('fAnnualMonth').value)||1;
}
if(currentType==='cyclic'||currentType==='media'||currentType==='sub'||currentType==='other'){
item.freq=parseInt(document.getElementById('fFreq').value)||1;
item.freqMonth=parseInt(document.getElementById('fFreqMonth').value)||1;
}
saveData(data); closeModal(); render();
}

function exportData(){
const data=loadData();
data.lastExport=new Date().toISOString();
saveData(data);
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url; a.download='platnosci-kopia-'+new Date().toISOString().slice(0,10)+'.json';
document.body.appendChild(a); a.click(); document.body.removeChild(a);
URL.revokeObjectURL(url);
render();
}
function importData(event){
const file=event.target.files[0]; if(!file) return;
const reader=new FileReader();
reader.onload=(e)=>{
try{
const parsed=JSON.parse(e.target.result);
if(!parsed||!Array.isArray(parsed.items)){ alert('Niepoprawny plik.'); return; }
if(!confirm('Zastąpić obecne dane ('+parsed.items.length+' pozycji)?')) return;
saveData(parsed); render(); alert('Dane wczytane.');
}catch(err){ alert('Błąd: '+err.message); }
event.target.value='';
};
reader.readAsText(file);
}

document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });
const _n=new Date(); viewYear=_n.getFullYear(); viewMonth=_n.getMonth();

/* ====== LOGOWANIE I SYNCHRONIZACJA — DODANE ====== */
const syncStatusEl = document.getElementById('syncStatus');

function startSync(){
// Pokaż od razu dane lokalne, żeby aplikacja nie "mrugała" pustym ekranem
render();

// Nasłuchuj na zmiany w Firebase (z DOWOLNEGO urządzenia, łącznie z tym)
fbRef.on('value', (snapshot) => {
const val = snapshot.val();
if(val){
_suppressUpload = true; // nie wysyłaj z powrotem tego, co właśnie przyszło
localStorage.setItem('platnosci_v3', JSON.stringify(val));
_suppressUpload = false;
render();
syncStatusEl.textContent = 'Zsynchronizowano ✓';
setTimeout(()=>{ syncStatusEl.style.display='none'; }, 2000);
} else {
// baza pusta — wyślij to, co mamy lokalnie, żeby ją zainicjować
saveData(loadData());
}
}, (err)=>{
syncStatusEl.textContent = 'Błąd synchronizacji — sprawdź logowanie/reguły';
console.error(err);
});
}

fbAuth.onAuthStateChanged((user) => {
if(user){
syncStatusEl.textContent = 'Zalogowano, synchronizuję...';
startSync();
} else {
syncStatusEl.textContent = 'Wymagane logowanie';
const email = prompt('Zaloguj się — podaj e-mail (Firebase):');
const pass = prompt('Podaj hasło:');
if(email && pass){
fbAuth.signInWithEmailAndPassword(email, pass).catch(err=>{
alert('Błąd logowania: ' + err.message);
syncStatusEl.textContent = 'Błąd logowania';
render();
});
} else {
render();
}
}
});

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
