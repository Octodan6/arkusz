<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1b2a3a">
<title>Płatności</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --ink:#1b2a3a;
  --paper:#f4f1ea;
  --accent:#c97b4a;
  --ok:#5b7a5e;
  --due:#b6543c;
  --warn:#b6853c;
  --line:#d9d3c7;
  --muted:#8a8275;
  --card:#ffffff;
  --debt:#7a3a6e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Georgia','Iowan Old Style',serif;background:var(--paper);color:var(--ink);padding-bottom:100px;}

header{padding:18px 18px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:5;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
header h1{font-size:1.45rem;margin:0;letter-spacing:0.02em;font-weight:700;}
.month-nav{display:flex;align-items:center;gap:8px;margin-top:10px;}
.month-nav button{background:none;border:1px solid var(--line);border-radius:6px;width:28px;height:28px;font-size:1rem;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.month-label{font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.82rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);min-width:148px;}
.today-btn{background:none;border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);cursor:pointer;flex-shrink:0;}
.header-actions{display:flex;gap:5px;flex-shrink:0;}
.header-actions button{background:none;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.63rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);cursor:pointer;}

.summary{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--line);}
.sum-box{padding:12px 14px;border-right:1px solid var(--line);}
.sum-box:last-child{border-right:none;}
.sum-box .lbl{font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:3px;}
.sum-box .val{font-size:1.05rem;font-weight:700;font-family:Georgia,serif;}
.val.red{color:var(--due);}
.val.green{color:var(--ok);}
.val.purple{color:var(--debt);}

.debt-bar{padding:10px 16px 12px;border-bottom:1px solid var(--line);font-family:'Helvetica Neue',Arial,sans-serif;}
.debt-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:7px;}
.debt-list{display:flex;flex-direction:column;gap:5px;}
.debt-row{display:flex;align-items:center;gap:7px;}
.debt-name{font-size:0.78rem;color:var(--ink);width:120px;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.debt-track{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.debt-fill{height:100%;border-radius:3px;background:var(--debt);}
.debt-fill.done{background:var(--ok);}
.debt-info{font-size:0.72rem;color:var(--muted);white-space:nowrap;min-width:90px;text-align:right;}
.debt-toggle{font-size:0.72rem;color:var(--accent);cursor:pointer;text-align:center;margin-top:6px;}

.section-label{font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--muted);padding:16px 18px 5px;}

.item{background:var(--card);margin:5px 12px;border-radius:10px;padding:11px 11px;display:flex;align-items:center;gap:9px;box-shadow:0 1px 3px rgba(27,42,58,0.06);border:1px solid var(--line);}
.item.done{opacity:0.48;}
.item.overdue{border-left:3px solid var(--due);}
.item.due-soon{border-left:3px solid var(--warn);}
.check{width:34px;height:34px;min-width:34px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:bold;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;transition:all .15s;}
.check.x{color:var(--due);border-color:var(--due);}
.check.v{color:var(--ok);border-color:var(--ok);background:rgba(91,122,94,0.1);}
.info{flex:1;min-width:0;}
.info .name{font-size:0.92rem;font-weight:700;}
.info .meta{font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.73rem;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.tag{background:#f0ece4;border-radius:4px;padding:1px 5px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;}
.tag.kredyt{background:#ede8f5;color:var(--debt);}
.tag.media{background:#e8f0e9;color:var(--ok);}
.tag.sub{background:#fdf0e6;color:var(--accent);}
.overdue-lbl{color:var(--due);font-weight:700;}
.soon-lbl{color:var(--warn);font-weight:700;}
.inst-bar{margin-top:5px;display:flex;align-items:center;gap:6px;}
.inst-track{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.inst-fill{height:100%;border-radius:2px;background:var(--debt);}
.inst-lbl{font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.68rem;color:var(--muted);white-space:nowrap;}
.amount-col{text-align:right;flex-shrink:0;}
.amount{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:0.92rem;white-space:nowrap;}
.remaining{display:block;font-size:0.68rem;color:var(--debt);font-weight:400;margin-top:1px;}
.del{color:var(--line);font-size:0.95rem;cursor:pointer;padding:3px 3px;font-family:'Helvetica Neue',Arial,sans-serif;flex-shrink:0;transition:color .15s;}
.del:hover{color:var(--due);}

.empty{padding:36px 22px;text-align:center;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.88rem;line-height:1.6;}

.fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.65rem;box-shadow:0 4px 14px rgba(201,123,74,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(27,42,58,0.5);z-index:20;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--paper);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:20px 18px 32px;max-height:90vh;overflow-y:auto;}
.modal h2{margin:0 0 14px;font-size:1.15rem;}
.field{margin-bottom:11px;}
.field label{display:block;font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:8px;font-size:0.92rem;background:#fff;font-family:'Helvetica Neue',Arial,sans-serif;color:var(--ink);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.type-toggle{display:flex;gap:5px;margin-bottom:13px;}
.type-toggle button{flex:1;padding:9px 3px;border-radius:8px;border:1px solid var(--line);background:#fff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.75rem;cursor:pointer;color:var(--muted);}
.type-toggle button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.credit-fields,.annual-fields{display:none;}
.credit-fields.show,.annual-fields.show{display:block;}
.hint{font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.73rem;color:var(--muted);margin-top:-5px;margin-bottom:11px;line-height:1.5;}
.modal-actions{display:flex;gap:9px;margin-top:14px;}
.btn{flex:1;padding:12px;border-radius:8px;border:none;font-family:'Helvetica Neue',Arial,sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;}
.btn.primary{background:var(--accent);color:#fff;}
.btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--line);}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Płatności</h1>
    <div class="header-actions">
      <button onclick="exportData()">Eksport</button>
      <button onclick="document.getElementById('importFile').click()">Import</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
    <button class="today-btn" onclick="goToday()">Dziś</button>
  </div>
</header>

<div class="summary">
  <div class="sum-box"><div class="lbl">Do zapłaty</div><div class="val red" id="sumDue">0 zł</div></div>
  <div class="sum-box"><div class="lbl">Opłacone</div><div class="val green" id="sumDone">0 zł</div></div>
  <div class="sum-box"><div class="lbl">Razem w m-cu</div><div class="val purple" id="sumMonth">0 zł</div></div>
</div>

<div id="debtSection" class="debt-bar">
  <div class="debt-title">Postęp spłaty kredytów</div>
  <div class="debt-list" id="debtList"></div>
  <div class="debt-toggle" id="debtToggle" onclick="toggleDebt()"></div>
</div>

<div id="listCyclic"></div>
<div id="listAnnual"></div>
<div id="listCredit"></div>
<div id="emptyState" class="empty" style="display:none;"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Nowa płatność</h2>
    <div class="type-toggle">
      <button type="button" class="active" data-type="cyclic" onclick="setType('cyclic')">Co miesiąc</button>
      <button type="button" data-type="annual" onclick="setType('annual')">Raz w roku</button>
      <button type="button" data-type="credit" onclick="setType('credit')">Kredyt / raty</button>
    </div>
    <div class="field">
      <label>Nazwa</label>
      <input type="text" id="fName" placeholder="np. Kredyt PKO, Czynsz">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Kwota raty (zł)</label>
        <input type="number" id="fAmount" placeholder="np. 820.36" step="0.01">
      </div>
      <div class="field">
        <label>Dzień płatności</label>
        <input type="number" id="fDay" min="1" max="31" placeholder="np. 10">
      </div>
    </div>
    <div class="annual-fields" id="annualFields">
      <div class="field">
        <label>Miesiąc płatności</label>
        <select id="fMonth">
          <option value="1">Styczeń</option><option value="2">Luty</option>
          <option value="3">Marzec</option><option value="4">Kwiecień</option>
          <option value="5">Maj</option><option value="6">Czerwiec</option>
          <option value="7">Lipiec</option><option value="8">Sierpień</option>
          <option value="9">Wrzesień</option><option value="10">Październik</option>
          <option value="11">Listopad</option><option value="12">Grudzień</option>
        </select>
      </div>
      <div class="hint">Pojawi się tylko w wybranym miesiącu, np. ubezpieczenie roczne.</div>
    </div>
    <div class="credit-fields" id="creditFields">
      <div class="field-row">
        <div class="field">
          <label>Łączna liczba rat</label>
          <input type="number" id="fTotalInst" min="1" placeholder="np. 36">
        </div>
        <div class="field">
          <label>Aktualna rata (nr)</label>
          <input type="number" id="fCurrentInst" min="1" placeholder="np. 5" value="1">
        </div>
      </div>
      <div class="field">
        <label>Pozostała kwota do spłaty (zł, opcjonalnie)</label>
        <input type="number" id="fRemaining" placeholder="np. 45000" step="0.01">
      </div>
      <div class="hint">Aplikacja wyliczy ile rat zostało i pokaże pasek postępu.</div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Anuluj</button>
      <button class="btn primary" onclick="saveItem()">Zapisz</button>
    </div>
  </div>
</div>

<script>
const MONTHS_PL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];

const DEFAULT_ITEMS = [
  {id:'d1', type:'credit', name:'Kacper',            amount:1700,    day:10, totalInstallments:240, currentInstallment:95,  remaining:null},
  {id:'d2', type:'credit', name:'Nykredit',           amount:820.36,  day:25, totalInstallments:240, currentInstallment:95,  remaining:null},
  {id:'d3', type:'credit', name:'Millennium kredyt',  amount:2159.14, day:10, totalInstallments:288, currentInstallment:95,  remaining:null},
  {id:'d4', type:'credit', name:'Millennium gotówk.', amount:708.76,  day:10, totalInstallments:60,  currentInstallment:30,  remaining:null},
  {id:'d5', type:'cyclic', name:'Czynsz',             amount:419,     day:10},
  {id:'d6', type:'cyclic', name:'Prąd Lumi',          amount:205.63,  day:24},
  {id:'d7', type:'cyclic', name:'Netflix',            amount:30,      day:10},
  {id:'d8', type:'credit', name:'Siemens BNP',        amount:145.36,  day:10, totalInstallments:24,  currentInstallment:18,  remaining:null},
  {id:'d9', type:'cyclic', name:'Kablówka',           amount:63,      day:17},
  {id:'d10',type:'credit', name:'Obiektyw',           amount:342.34,  day:10, totalInstallments:12,  currentInstallment:5,   remaining:null},
  {id:'d11',type:'credit', name:'Alior kredyt',       amount:1823.08, day:10, totalInstallments:120, currentInstallment:20,  remaining:null},
  {id:'d12',type:'credit', name:'RTV AGD Alior',      amount:574.85,  day:10, totalInstallments:18,  currentInstallment:5,   remaining:null},
  {id:'d13',type:'cyclic', name:'Kablówka Hapay',     amount:154,     day:15},
  {id:'d14',type:'cyclic', name:'Śmieci',             amount:120,     day:10},
  {id:'d15',type:'cyclic', name:'Prąd PGE',           amount:200,     day:29},
  {id:'d16',type:'credit', name:'Materac Santander',  amount:597.39,  day:6,  totalInstallments:10,  currentInstallment:5,   remaining:null},
  {id:'d17',type:'credit', name:'Ikano szafy',        amount:750,     day:5,  totalInstallments:20,  currentInstallment:3,   remaining:null},
  {id:'d18',type:'cyclic', name:'Woda',               amount:300,     day:9},
  {id:'d19',type:'cyclic', name:'Przedszkola',        amount:1000,    day:10},
  {id:'d20',type:'cyclic', name:'Spotify',            amount:30,      day:10},
  {id:'d21',type:'cyclic', name:'YouTube',            amount:60,      day:10},
  {id:'d22',type:'cyclic', name:'Lux-Med',            amount:62,      day:20},
  {id:'d23',type:'credit', name:'Santander suszarka', amount:328.60,  day:16, totalInstallments:10,  currentInstallment:8,   remaining:null},
  {id:'d24',type:'credit', name:'AS Inbank kurs',     amount:99,      day:19, totalInstallments:6,   currentInstallment:2,   remaining:null},
];

function loadData(){
  const raw = localStorage.getItem('platnosci_v2');
  if(raw) return JSON.parse(raw);
  const v1 = localStorage.getItem('platnosci_v1');
  if(v1){
    try{
      const old = JSON.parse(v1);
      return {items: old.items||[], paid:{}};
    } catch(e){}
  }
  return {items: JSON.parse(JSON.stringify(DEFAULT_ITEMS)), paid:{}};
}
function saveData(data){ localStorage.setItem('platnosci_v2', JSON.stringify(data)); }

function monthKey(y,m){ return y+'-'+(m+1); }
function isPaid(data,id,y,m){ const mk=monthKey(y,m); return !!(data.paid[mk]&&data.paid[mk][id]); }
function setPaid(data,id,y,m,val){ const mk=monthKey(y,m); if(!data.paid[mk])data.paid[mk]={}; data.paid[mk][id]=val; }

function fmt(n){ return (Math.round(n*100)/100).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})+' zł'; }
function fmtShort(n){ if(n>=100000) return Math.round(n/1000)+' tys. zł'; if(n>=10000) return (Math.round(n/100)/10).toFixed(1)+' tys. zł'; return Math.round(n).toLocaleString('pl-PL')+' zł'; }

// How many app-tracked payments were made for this item before month y/m
function appPaidBefore(data, item, y, m){
  let count = 0;
  Object.keys(data.paid).forEach(mk => {
    const parts = mk.split('-');
    const ky = parseInt(parts[0]);
    const km = parseInt(parts[1]) - 1;
    if(ky < y || (ky === y && km < m)){
      if(data.paid[mk][item.id]) count++;
    }
  });
  return count;
}

// Current installment number for a given month
function instForMonth(item, data, y, m){
  const before = appPaidBefore(data, item, y, m);
  return item.currentInstallment + before;
}

let viewYear, viewMonth, debtExpanded = false;

function goToday(){ const n=new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth(); render(); }
function changeMonth(d){ viewMonth+=d; if(viewMonth>11){viewMonth=0;viewYear++;} if(viewMonth<0){viewMonth=11;viewYear--;} render(); }
function toggleDebt(){ debtExpanded=!debtExpanded; render(); }

function render(){
  const data = loadData();
  const now = new Date();
  const isCurrent = viewYear===now.getFullYear() && viewMonth===now.getMonth();

  document.getElementById('monthLabel').textContent = MONTHS_PL[viewMonth]+' '+viewYear;

  const cyclic = data.items.filter(i=>i.type==='cyclic');
  const annual = data.items.filter(i=>i.type==='annual' && i.month===(viewMonth+1));
  const credits = data.items.filter(i=>i.type==='credit');
  const creditVisible = credits.filter(i=>{
    const inst = instForMonth(i, data, viewYear, viewMonth);
    return inst>=1 && inst<=i.totalInstallments;
  });

  let due=0, done=0, total=0;
  [...cyclic,...annual,...creditVisible].forEach(i=>{
    const p = isPaid(data,i.id,viewYear,viewMonth);
    total += Number(i.amount)||0;
    if(p) done += Number(i.amount)||0;
    else due += Number(i.amount)||0;
  });
  document.getElementById('sumDue').textContent = fmt(due);
  document.getElementById('sumDone').textContent = fmt(done);
  document.getElementById('sumMonth').textContent = fmt(total);

  // Debt section
  if(credits.length===0){
    document.getElementById('debtSection').style.display='none';
  } else {
    document.getElementById('debtSection').style.display='block';
    const showN = debtExpanded ? credits.length : Math.min(5,credits.length);
    let dHtml='';
    credits.slice(0,showN).forEach(it=>{
      const inst = instForMonth(it,data,viewYear,viewMonth);
      const paid = Math.max(0, inst-1);
      const total = it.totalInstallments;
      const pct = total>0 ? Math.min(100,Math.round(paid/total*100)) : 0;
      const left = Math.max(0, total-paid);
      const isDone = paid>=total;
      let infoStr = paid+'/'+total+' rat';
      if(left>0) infoStr += ' · zostało '+left;
      if(it.remaining!=null) infoStr += ' · '+fmtShort(it.remaining);
      dHtml+=`<div class="debt-row">
        <span class="debt-name" title="${esc(it.name)}">${esc(it.name)}</span>
        <div class="debt-track"><div class="debt-fill ${isDone?'done':''}" style="width:${pct}%"></div></div>
        <span class="debt-info">${infoStr}</span>
      </div>`;
    });
    document.getElementById('debtList').innerHTML = dHtml;
    const tog = document.getElementById('debtToggle');
    if(credits.length>5){
      tog.style.display='block';
      tog.textContent = debtExpanded ? 'pokaż mniej ▴' : 'pokaż wszystkie ('+credits.length+') ▾';
    } else {
      tog.style.display='none';
    }
  }

  document.getElementById('listCyclic').innerHTML = sectionHtml('Co miesiąc', cyclic, data, now, isCurrent);
  document.getElementById('listAnnual').innerHTML = sectionHtml('Raz w roku', annual, data, now, isCurrent);
  document.getElementById('listCredit').innerHTML = sectionHtml('Kredyty i raty', creditVisible, data, now, isCurrent);

  const tot = cyclic.length+annual.length+creditVisible.length;
  const el = document.getElementById('emptyState');
  if(tot===0){ el.style.display='block'; el.innerHTML='Brak płatności na ten miesiąc.<br>Dotknij + aby dodać pierwszą.'; }
  else el.style.display='none';
}

function catTag(it){
  if(it.type==='credit') return '<span class="tag kredyt">kredyt</span>';
  const media=['Czynsz','Prąd Lumi','Prąd PGE','Śmieci','Woda','woda'];
  const sub=['Netflix','Spotify','YouTube','Kablówka Hapay','Lux-Med','Virgin','virgin'];
  if(media.some(n=>it.name.toLowerCase().includes(n.toLowerCase()))) return '<span class="tag media">media</span>';
  if(sub.some(n=>it.name.toLowerCase().includes(n.toLowerCase()))) return '<span class="tag sub">abonam.</span>';
  return '';
}

function sectionHtml(label, items, data, now, isCurrent){
  if(items.length===0) return '';
  const sorted = [...items].sort((a,b)=>{
    const pa=isPaid(data,a.id,viewYear,viewMonth);
    const pb=isPaid(data,b.id,viewYear,viewMonth);
    if(pa!==pb) return pa?1:-1;
    return (a.day||99)-(b.day||99);
  });
  let html=`<div class="section-label">${label}</div>`;
  sorted.forEach(it=>{
    const paid = isPaid(data,it.id,viewYear,viewMonth);
    const day = it.day||null;
    const overdue = isCurrent && !paid && day && day<now.getDate();
    const soon   = isCurrent && !paid && day && (day-now.getDate())>=0 && (day-now.getDate())<=3;
    let cls='item'+(paid?' done':overdue?' overdue':soon?' due-soon':'');
    let metaParts=[];
    if(day){
      const ds=day+'.'+String(viewMonth+1).padStart(2,'0');
      if(overdue) metaParts.push(`<span class="overdue-lbl">‼ Termin: ${ds}</span>`);
      else if(soon) metaParts.push(`<span class="soon-lbl">⚡ do ${ds}</span>`);
      else metaParts.push(`<span>do ${day}.</span>`);
    }
    const tag=catTag(it);
    if(tag) metaParts.push(tag);

    let instHtml='', remHtml='';
    if(it.type==='credit'){
      const inst = instForMonth(it,data,viewYear,viewMonth);
      const paidN = Math.max(0,inst-1);
      const tot = it.totalInstallments;
      const pct = tot>0?Math.min(100,Math.round(paidN/tot*100)):0;
      const left = Math.max(0,tot-inst+1);
      instHtml=`<div class="inst-bar">
        <div class="inst-track"><div class="inst-fill" style="width:${pct}%"></div></div>
        <span class="inst-lbl">rata ${inst}/${tot} · zostało ${left}</span>
      </div>`;
      if(it.remaining!=null) remHtml=`<span class="remaining">${fmt(it.remaining)}</span>`;
    }
    html+=`<div class="${cls}">
      <div class="check ${paid?'v':'x'}" onclick="toggle('${it.id}')">${paid?'✓':'✗'}</div>
      <div class="info">
        <div class="name">${esc(it.name)}</div>
        <div class="meta">${metaParts.join('')}</div>
        ${instHtml}
      </div>
      <div class="amount-col">
        <span class="amount">${fmt(it.amount)}</span>
        ${remHtml}
      </div>
      <div class="del" onclick="removeItem('${it.id}')">✕</div>
    </div>`;
  });
  return html;
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function toggle(id){
  const data=loadData();
  const cur=isPaid(data,id,viewYear,viewMonth);
  setPaid(data,id,viewYear,viewMonth,!cur);
  saveData(data); render();
}

function removeItem(id){
  if(!confirm('Usunąć tę pozycję na stałe?')) return;
  const data=loadData();
  data.items=data.items.filter(x=>x.id!==id);
  saveData(data); render();
}

let currentType='cyclic';
function setType(t){
  currentType=t;
  document.querySelectorAll('.type-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.type===t));
  document.getElementById('annualFields').classList.toggle('show',t==='annual');
  document.getElementById('creditFields').classList.toggle('show',t==='credit');
}

function openModal(){
  document.getElementById('modalBg').classList.add('open');
  ['fName','fAmount','fDay','fTotalInst','fRemaining'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fCurrentInst').value='1';
  setType('cyclic');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

function saveItem(){
  const name=document.getElementById('fName').value.trim();
  const amount=parseFloat(document.getElementById('fAmount').value);
  const day=parseInt(document.getElementById('fDay').value)||null;
  if(!name||isNaN(amount)){ alert('Podaj przynajmniej nazwę i kwotę.'); return; }
  const data=loadData();
  const item={id:'id'+Date.now(), type:currentType, name, amount, day};
  if(currentType==='annual') item.month=parseInt(document.getElementById('fMonth').value);
  if(currentType==='credit'){
    item.totalInstallments=parseInt(document.getElementById('fTotalInst').value)||1;
    item.currentInstallment=parseInt(document.getElementById('fCurrentInst').value)||1;
    const rem=document.getElementById('fRemaining').value;
    item.remaining=rem?parseFloat(rem):null;
  }
  data.items.push(item);
  saveData(data); closeModal(); render();
}

function exportData(){
  const data=loadData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='platnosci-kopia-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed||!Array.isArray(parsed.items)){ alert('Niepoprawny plik.'); return; }
      if(!confirm('Plik zawiera '+parsed.items.length+' pozycji. Zastąpić dane?')) return;
      saveData(parsed); render(); alert('Dane wczytane.');
    } catch(err){ alert('Błąd: '+err.message); }
    event.target.value='';
  };
  reader.readAsText(file);
}

document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });

const _n=new Date(); viewYear=_n.getFullYear(); viewMonth=_n.getMonth();
render();

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
